<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTtrawler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #1f1f1f;
    --border-bright: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #666;
    --text-mid: #999;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-border: rgba(200,241,53,0.25);
    --red: #ff4d4d;
    --red-dim: rgba(255,77,77,0.1);
    --amber: #ffb347;
    --amber-dim: rgba(255,179,71,0.1);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.1);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; padding: 0 0 80px; }

  /* ── HEADER ── */
  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .logo { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
  .logo-slash { color: var(--border-bright); margin: 0 4px; }
  .tagline { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); letter-spacing: 0.06em; }

  /* ── TABS ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 32px; }
  .tab { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 20px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
  .tab:hover { color: var(--text-mid); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; }
  main { max-width: 780px; margin: 0 auto; padding: 48px 32px 0; }

  /* ── INPUT ── */
  .input-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .url-row { display: flex; border: 1px solid var(--border-bright); border-radius: 3px; overflow: hidden; transition: border-color 0.15s; }
  .url-row:focus-within { border-color: var(--accent); }
  .url-input { flex: 1; background: var(--surface); border: none; outline: none; padding: 14px 16px; font-family: var(--font-mono); font-size: 13px; color: var(--text); min-width: 0; }
  .url-input::placeholder { color: var(--text-dim); }
  .btn-primary { background: var(--accent); color: #0d0d0d; border: none; padding: 14px 24px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── DISCOVER CONTROLS ── */
  .discover-row { display: grid; grid-template-columns: 1fr auto auto; gap: 0; border: 1px solid var(--border-bright); border-radius: 3px; overflow: hidden; transition: border-color 0.15s; margin-bottom: 12px; }
  .discover-row:focus-within { border-color: var(--accent); }
  .discover-input { background: var(--surface); border: none; outline: none; padding: 14px 16px; font-family: var(--font-mono); font-size: 13px; color: var(--text); min-width: 0; }
  .discover-input::placeholder { color: var(--text-dim); }
  .count-select { background: var(--surface); border: none; border-left: 1px solid var(--border-bright); outline: none; padding: 14px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--text-mid); cursor: pointer; }
  .order-select { background: var(--surface); border: none; border-left: 1px solid var(--border-bright); outline: none; padding: 14px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--text-mid); cursor: pointer; }

  /* ── STATUS ── */
  .status { margin-top: 12px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); min-height: 16px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 8px; height: 8px; border: 1.5px solid var(--border-bright); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-card { border: 1px solid rgba(255,77,77,0.25); background: var(--red-dim); border-radius: 3px; padding: 16px 20px; font-family: var(--font-mono); font-size: 12px; color: var(--red); display: none; margin-bottom: 24px; }
  .error-card.visible { display: block; }

  /* ── TRIAGE CARD ── */
  .triage-card { border: 1px solid var(--border-bright); border-radius: 3px; overflow: hidden; margin-bottom: 24px; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; }
  .triage-card.visible { opacity: 1; transform: translateY(0); }
  .triage-header { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .video-meta { flex: 1; min-width: 0; }
  .video-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .video-channel { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
  .verdict-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }
  .verdict-watch { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
  .verdict-skim  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,71,0.25); }
  .verdict-skip  { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,77,0.25); }
  .triage-body { padding: 20px; }
  .triage-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .triage-field label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .triage-field p { font-size: 13px; color: var(--text); line-height: 1.55; }
  .quality-badge { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 2px; letter-spacing: 0.06em; }
  .quality-evidence { background: var(--accent-dim); color: var(--accent); }
  .quality-mixed    { background: var(--blue-dim); color: var(--blue); }
  .quality-anecdote { background: var(--amber-dim); color: var(--amber); }
  .quality-bro      { background: var(--red-dim); color: var(--red); }
  .topics-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .topic-chip { font-family: var(--font-mono); font-size: 10px; color: var(--text-mid); border: 1px solid var(--border-bright); padding: 3px 8px; border-radius: 2px; }
  .extract-row { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border); }
  .extract-row p { font-size: 12px; color: var(--text-dim); flex: 1; }
  .btn-extract { background: transparent; color: var(--accent); border: 1px solid var(--accent-border); padding: 9px 18px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn-extract:hover { background: var(--accent-dim); }
  .btn-extract:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── EXTRACT CARD ── */
  .extract-card { border: 1px solid var(--border-bright); border-radius: 3px; overflow: hidden; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; }
  .extract-card.visible { opacity: 1; transform: translateY(0); }
  .extract-section { border-bottom: 1px solid var(--border); padding: 20px; }
  .extract-section:last-child { border-bottom: none; }
  .section-title { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .item-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .item-list li { font-size: 13px; color: var(--text); line-height: 1.55; padding-left: 16px; position: relative; }
  .item-list li::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-family: var(--font-mono); }
  .ref-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 14px; }
  .ref-type { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); border: 1px solid var(--border-bright); padding: 2px 6px; border-radius: 2px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .ref-content { flex: 1; }
  .ref-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ref-context { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .ref-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; }
  .findability-dot { font-size: 10px; }
  .flag-item { background: var(--red-dim); border: 1px solid rgba(255,77,77,0.15); border-radius: 2px; padding: 10px 12px; font-size: 12px; color: var(--text-mid); line-height: 1.5; margin-bottom: 8px; }
  .notion-link { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-decoration: none; padding: 6px 12px; border: 1px solid var(--border-bright); border-radius: 2px; transition: border-color 0.15s, color 0.15s; margin-top: 4px; }
  .notion-link:hover { border-color: var(--accent-border); color: var(--accent); }
  .empty-state { font-size: 12px; color: var(--text-dim); font-style: italic; }

  /* ── DISCOVER RESULTS ── */
  .discover-results { margin-top: 24px; }
  .results-header { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .results-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .video-card { border: 1px solid var(--border-bright); border-radius: 3px; overflow: hidden; margin-bottom: 12px; display: grid; grid-template-columns: 160px 1fr; transition: border-color 0.15s; }
  .video-card:hover { border-color: var(--border-bright); }
  .video-thumb { width: 160px; height: 90px; object-fit: cover; display: block; background: var(--surface); }
  .video-thumb-placeholder { width: 160px; height: 90px; background: var(--surface); display: flex; align-items: center; justify-content: center; }
  .video-info { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; background: var(--surface); }
  .video-card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .video-card-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); display: flex; gap: 12px; flex-wrap: wrap; }
  .video-card-actions { display: flex; gap: 8px; margin-top: auto; }
  .btn-card-triage { background: var(--accent); color: #0d0d0d; border: none; padding: 6px 14px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: opacity 0.15s; }
  .btn-card-triage:hover { opacity: 0.85; }
  .btn-card-url { background: transparent; color: var(--text-dim); border: 1px solid var(--border-bright); padding: 6px 14px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; text-decoration: none; display: inline-flex; align-items: center; transition: border-color 0.15s, color 0.15s; }
  .btn-card-url:hover { border-color: var(--accent-border); color: var(--accent); }

  @media (max-width: 600px) {
    main { padding: 32px 16px 0; }
    header { padding: 16px; }
    .tabs { padding: 0 16px; }
    .triage-row { grid-template-columns: 1fr; }
    .video-card { grid-template-columns: 1fr; }
    .video-thumb { width: 100%; height: 180px; }
    .video-thumb-placeholder { width: 100%; height: 180px; }
    .discover-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">YT<span class="logo-slash">/</span>trawler</div>
  </div>
  <div class="tagline">signal extraction from video noise</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('triage')">Triage</div>
  <div class="tab" onclick="switchTab('discover')">Discover</div>
</div>

<!-- ── TRIAGE PANEL ── -->
<div id="panel-triage" class="panel active">
<main>
  <div style="margin-bottom: 48px;">
    <span class="input-label">YouTube URL</span>
    <div class="url-row">
      <input type="text" class="url-input" id="urlInput" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="triageBtn" onclick="runTriage()">Triage</button>
    </div>
    <div class="status" id="triageStatus">
      <div class="spinner" id="triageSpinner"></div>
      <span id="triageStatusText"></span>
    </div>
  </div>

  <div class="error-card" id="triageError"></div>

  <div class="triage-card" id="triageCard">
    <div class="triage-header">
      <div class="video-meta">
        <div class="video-title" id="videoTitle"></div>
        <div class="video-channel" id="videoChannel"></div>
      </div>
      <div class="verdict-badge" id="verdictBadge"></div>
    </div>
    <div class="triage-body">
      <div class="triage-row">
        <div class="triage-field" style="grid-column: 1 / -1;">
          <label>Summary</label>
          <p id="triageSummary"></p>
        </div>
      </div>
      <div class="triage-row">
        <div class="triage-field">
          <label>Verdict reason</label>
          <p id="verdictReason"></p>
        </div>
        <div class="triage-field">
          <label>Quality signal</label>
          <div id="qualityBadge"></div>
          <p id="qualityNotes" style="margin-top: 8px;"></p>
        </div>
      </div>
      <div class="triage-field">
        <label>Topics</label>
        <div class="topics-row" id="topicsRow"></div>
      </div>
    </div>
    <div class="extract-row">
      <p>Full transcript analysis → Notion log</p>
      <button class="btn-extract" id="extractBtn" onclick="runExtract()">Deep Extract →</button>
    </div>
  </div>

  <div class="extract-card" id="extractCard">
    <div class="extract-section" id="notionSection" style="display:none;">
      <div class="section-title">Logged to Notion</div>
      <a class="notion-link" id="notionLink" href="#" target="_blank">↗ Open in Notion</a>
    </div>
    <div class="extract-section">
      <div class="section-title">Key Claims</div>
      <ul class="item-list" id="keyClaimsList"></ul>
    </div>
    <div class="extract-section">
      <div class="section-title">References</div>
      <div id="referencesList"></div>
    </div>
    <div class="extract-section">
      <div class="section-title">Coaching Ideas</div>
      <ul class="item-list" id="coachingList"></ul>
    </div>
    <div class="extract-section">
      <div class="section-title">Content Hooks</div>
      <ul class="item-list" id="contentHooksList"></ul>
    </div>
    <div class="extract-section">
      <div class="section-title">Research Questions</div>
      <ul class="item-list" id="researchList"></ul>
    </div>
    <div class="extract-section">
      <div class="section-title">🚩 Bro-Science Flags</div>
      <div id="broScienceList"></div>
    </div>
  </div>
</main>
</div>

<!-- ── DISCOVER PANEL ── -->
<div id="panel-discover" class="panel">
<main>
  <div style="margin-bottom: 16px;">
    <span class="input-label">Search YouTube</span>
    <div class="discover-row">
      <input type="text" class="discover-input" id="discoverInput" placeholder="e.g. rucking for older men, zone 2 cardio, kettlebell programming..." autocomplete="off" spellcheck="false">
      <select class="count-select" id="countSelect">
        <option value="3">3 videos</option>
        <option value="5" selected>5 videos</option>
        <option value="10">10 videos</option>
        <option value="15">15 videos</option>
      </select>
      <select class="order-select" id="orderSelect">
        <option value="date">Most recent</option>
        <option value="relevance">Most relevant</option>
        <option value="viewCount">Most viewed</option>
        <option value="rating">Top rated</option>
      </select>
    </div>
    <div style="display:flex; gap:0; border: 1px solid var(--border-bright); border-radius: 3px; overflow: hidden; width: fit-content;">
      <button class="btn-primary" id="discoverBtn" onclick="runDiscover()">Search</button>
    </div>
    <div class="status" id="discoverStatus">
      <div class="spinner" id="discoverSpinner"></div>
      <span id="discoverStatusText"></span>
    </div>
  </div>

  <div class="error-card" id="discoverError"></div>

  <div class="discover-results" id="discoverResults" style="display:none;">
    <div class="results-header" id="resultsHeader"></div>
    <div id="videoCards"></div>
  </div>
</main>
</div>

<script>
  const WORKER_URL = 'https://yttrawler-proxy.ian-mcarthur.workers.dev';

  let currentTriageData = null;
  let currentUrl = null;

  // ── TABS ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
  }

  // ── TRIAGE ──
  function setTriageStatus(text, loading = false) {
    document.getElementById('triageStatusText').textContent = text;
    document.getElementById('triageSpinner').classList.toggle('active', loading);
  }

  function showTriageError(msg) {
    const el = document.getElementById('triageError');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }

  function hideTriageError() {
    document.getElementById('triageError').classList.remove('visible');
  }

  function setTriageLoading(loading) {
    document.getElementById('triageBtn').disabled = loading;
    document.getElementById('extractBtn').disabled = loading;
  }

  async function runTriage() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    hideTriageError();
    setTriageLoading(true);
    setTriageStatus('Fetching transcript...', true);
    document.getElementById('triageCard').classList.remove('visible');
    document.getElementById('extractCard').classList.remove('visible');
    try {
      setTriageStatus('Analysing...', true);
      const res = await fetch(`${WORKER_URL}/triage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Triage failed');
      currentTriageData = data;
      currentUrl = url;
      renderTriage(data);
      setTriageStatus('');
    } catch (err) {
      showTriageError(err.message);
      setTriageStatus('');
    } finally {
      setTriageLoading(false);
    }
  }

  async function runExtract() {
    if (!currentUrl) return;
    hideTriageError();
    setTriageLoading(true);
    setTriageStatus('Deep extracting — ~20s...', true);
    document.getElementById('extractCard').classList.remove('visible');
    try {
      const res = await fetch(`${WORKER_URL}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: currentUrl, triageData: currentTriageData })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Extraction failed');
      renderExtract(data);
      setTriageStatus('');
    } catch (err) {
      showTriageError(err.message);
      setTriageStatus('');
    } finally {
      setTriageLoading(false);
    }
  }

  function renderTriage(d) {
    document.getElementById('videoTitle').textContent = d.title;
    document.getElementById('videoChannel').textContent = `${d.channel} · ~${d.estimatedMinutes} min`;
    const badge = document.getElementById('verdictBadge');
    badge.textContent = d.verdict;
    badge.className = 'verdict-badge verdict-' + d.verdict.toLowerCase();
    document.getElementById('triageSummary').textContent = d.summary;
    document.getElementById('verdictReason').textContent = d.verdict_reason;
    const qualityMap = { 'Evidence-based': 'quality-evidence', 'Mixed': 'quality-mixed', 'Anecdote-heavy': 'quality-anecdote', 'Bro-science': 'quality-bro' };
    document.getElementById('qualityBadge').innerHTML = `<span class="quality-badge ${qualityMap[d.quality_signal] || ''}">${d.quality_signal}</span>`;
    document.getElementById('qualityNotes').textContent = d.quality_notes;
    document.getElementById('topicsRow').innerHTML = (d.topics || []).map(t => `<span class="topic-chip">${escHtml(t)}</span>`).join('');
    document.getElementById('triageCard').classList.add('visible');
  }

  function renderList(listId, items, emptyMsg = 'None identified.') {
    const el = document.getElementById(listId);
    if (!items || items.length === 0) { el.innerHTML = `<span class="empty-state">${emptyMsg}</span>`; return; }
    el.innerHTML = items.map(item => `<li>${escHtml(item)}</li>`).join('');
  }

  function renderExtract(d) {
    if (d.notionPageUrl) {
      document.getElementById('notionSection').style.display = 'block';
      document.getElementById('notionLink').href = d.notionPageUrl;
    }
    renderList('keyClaimsList', d.key_claims, 'No key claims extracted.');
    renderList('coachingList', d.coaching_ideas, 'No coaching ideas identified.');
    renderList('contentHooksList', d.content_hooks, 'No content hooks identified.');
    renderList('researchList', d.research_questions, 'No research questions raised.');

    const refEl = document.getElementById('referencesList');
    if (!d.references || d.references.length === 0) {
      refEl.innerHTML = '<span class="empty-state">No references mentioned.</span>';
    } else {
      refEl.innerHTML = d.references.map(r => {
        const findIcon = r.findability === 'high' ? '🟢' : r.findability === 'medium' ? '🟡' : '🔴';
        const hint = r.search_hint ? `<div class="ref-hint"><span class="findability-dot">${findIcon}</span> <span>${escHtml(r.search_hint)}</span></div>` : '';
        return `<div class="ref-item">
          <span class="ref-type">${escHtml(r.type)}</span>
          <div class="ref-content">
            <div class="ref-name">${escHtml(r.name)}</div>
            <div class="ref-context">${escHtml(r.context)}</div>
            ${hint}
          </div>
        </div>`;
      }).join('');
    }

    const bsEl = document.getElementById('broScienceList');
    if (!d.broscience_flags || d.broscience_flags.length === 0) {
      bsEl.innerHTML = '<span class="empty-state">None flagged.</span>';
    } else {
      bsEl.innerHTML = d.broscience_flags.map(f => `<div class="flag-item">${escHtml(f)}</div>`).join('');
    }

    document.getElementById('extractCard').classList.add('visible');
    document.getElementById('extractCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── DISCOVER ──
  function setDiscoverStatus(text, loading = false) {
    document.getElementById('discoverStatusText').textContent = text;
    document.getElementById('discoverSpinner').classList.toggle('active', loading);
  }

  function showDiscoverError(msg) {
    const el = document.getElementById('discoverError');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }

  function hideDiscoverError() {
    document.getElementById('discoverError').classList.remove('visible');
  }

  async function runDiscover() {
    const query = document.getElementById('discoverInput').value.trim();
    if (!query) return;
    const count = parseInt(document.getElementById('countSelect').value);
    const order = document.getElementById('orderSelect').value;

    hideDiscoverError();
    document.getElementById('discoverBtn').disabled = true;
    document.getElementById('discoverResults').style.display = 'none';
    setDiscoverStatus('Searching YouTube...', true);

    try {
      const res = await fetch(`${WORKER_URL}/discover`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, count, order })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Search failed');
      renderDiscoverResults(data);
      setDiscoverStatus('');
    } catch (err) {
      showDiscoverError(err.message);
      setDiscoverStatus('');
    } finally {
      document.getElementById('discoverBtn').disabled = false;
    }
  }

  function renderDiscoverResults(data) {
    const { videos, query } = data;
    document.getElementById('resultsHeader').textContent = `${videos.length} results for "${query}"`;

    if (!videos || videos.length === 0) {
      document.getElementById('videoCards').innerHTML = '<span class="empty-state">No videos found.</span>';
      document.getElementById('discoverResults').style.display = 'block';
      return;
    }

    document.getElementById('videoCards').innerHTML = videos.map(v => {
      const date = v.publishedAt ? new Date(v.publishedAt).toLocaleDateString('en-AU', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
      const views = v.viewCount ? parseInt(v.viewCount).toLocaleString() + ' views' : '';
      const thumb = v.thumbnail
        ? `<img class="video-thumb" src="${escHtml(v.thumbnail)}" alt="" loading="lazy">`
        : `<div class="video-thumb-placeholder"></div>`;
      return `<div class="video-card">
        ${thumb}
        <div class="video-info">
          <div class="video-card-title">${escHtml(v.title)}</div>
          <div class="video-card-meta">
            <span>${escHtml(v.channel)}</span>
            <span>${date}</span>
            ${v.duration !== '—' ? `<span>${escHtml(v.duration)}</span>` : ''}
            ${views ? `<span>${views}</span>` : ''}
          </div>
          <div class="video-card-actions">
            <button class="btn-card-triage" onclick="triageFromDiscover('${escHtml(v.url)}')">Triage →</button>
            <a class="btn-card-url" href="${escHtml(v.url)}" target="_blank">↗ YouTube</a>
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('discoverResults').style.display = 'block';
  }

  function triageFromDiscover(url) {
    switchTab('triage');
    document.getElementById('urlInput').value = url;
    runTriage();
  }

  // ── UTILS ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') runTriage(); });
  document.getElementById('discoverInput').addEventListener('keydown', e => { if (e.key === 'Enter') runDiscover(); });
</script>
</body>
</html>
