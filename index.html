<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTtrawler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #1f1f1f;
    --border-bright: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #666;
    --text-mid: #999;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-border: rgba(200,241,53,0.25);
    --red: #ff4d4d;
    --red-dim: rgba(255,77,77,0.1);
    --amber: #ffb347;
    --amber-dim: rgba(255,179,71,0.1);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.1);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .logo-slash {
    color: var(--border-bright);
    margin: 0 4px;
  }

  .tagline {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  /* ── MAIN ── */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 32px 0;
  }

  /* ── INPUT SECTION ── */
  .input-section {
    margin-bottom: 48px;
  }

  .input-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .url-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .url-row:focus-within {
    border-color: var(--accent);
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: none;
    outline: none;
    padding: 14px 16px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    min-width: 0;
  }

  .url-input::placeholder { color: var(--text-dim); }

  .btn-triage {
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    padding: 14px 24px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-triage:hover { opacity: 0.85; }
  .btn-triage:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── STATUS ── */
  .status {
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    min-height: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 8px; height: 8px;
    border: 1.5px solid var(--border-bright);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .spinner.active { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TRIAGE RESULT ── */
  .triage-card {
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .triage-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .triage-header {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .video-meta { flex: 1; min-width: 0; }

  .video-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .video-channel {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .verdict-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .verdict-watch { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
  .verdict-skim  { background: var(--amber-dim);  color: var(--amber);  border: 1px solid rgba(255,179,71,0.25); }
  .verdict-skip  { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(255,77,77,0.25); }

  .triage-body {
    padding: 20px;
  }

  .triage-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .triage-field label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }

  .triage-field p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }

  .quality-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.06em;
  }

  .quality-evidence  { background: var(--accent-dim); color: var(--accent); }
  .quality-mixed     { background: var(--blue-dim);   color: var(--blue); }
  .quality-anecdote  { background: var(--amber-dim);  color: var(--amber); }
  .quality-bro       { background: var(--red-dim);    color: var(--red); }

  .topics-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .topic-chip {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-mid);
    border: 1px solid var(--border-bright);
    padding: 3px 8px;
    border-radius: 2px;
  }

  /* ── EXTRACT BUTTON ── */
  .extract-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .extract-row p {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
  }

  .btn-extract {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent-border);
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-extract:hover { background: var(--accent-dim); }
  .btn-extract:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── EXTRACT RESULT ── */
  .extract-card {
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .extract-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .extract-section {
    border-bottom: 1px solid var(--border);
    padding: 20px;
  }

  .extract-section:last-child { border-bottom: none; }

  .section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .item-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-list li {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
    padding-left: 16px;
    position: relative;
  }

  .item-list li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: var(--font-mono);
  }

  .ref-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .ref-type {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    border: 1px solid var(--border-bright);
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .ref-content { flex: 1; }
  .ref-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ref-context { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .flag-item {
    background: var(--red-dim);
    border: 1px solid rgba(255,77,77,0.15);
    border-radius: 2px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .notion-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    transition: border-color 0.15s, color 0.15s;
    margin-top: 4px;
  }

  .notion-link:hover { border-color: var(--accent-border); color: var(--accent); }

  .empty-state {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── ERROR ── */
  .error-card {
    border: 1px solid rgba(255,77,77,0.25);
    background: var(--red-dim);
    border-radius: 3px;
    padding: 16px 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--red);
    display: none;
    margin-bottom: 24px;
  }

  .error-card.visible { display: block; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  @media (max-width: 600px) {
    main { padding: 32px 16px 0; }
    header { padding: 16px; }
    .triage-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">YT<span class="logo-slash">/</span>trawler</div>
  </div>
  <div class="tagline">signal extraction from video noise</div>
</header>

<main>

  <div class="input-section">
    <span class="input-label">YouTube URL</span>
    <div class="url-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://youtube.com/watch?v=..."
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn-triage" id="triageBtn" onclick="runTriage()">Triage</button>
    </div>
    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="statusText"></span>
    </div>
  </div>

  <div class="error-card" id="errorCard"></div>

  <!-- TRIAGE RESULT -->
  <div class="triage-card" id="triageCard">
    <div class="triage-header">
      <div class="video-meta">
        <div class="video-title" id="videoTitle"></div>
        <div class="video-channel" id="videoChannel"></div>
      </div>
      <div class="verdict-badge" id="verdictBadge"></div>
    </div>

    <div class="triage-body">
      <div class="triage-row">
        <div class="triage-field" style="grid-column: 1 / -1;">
          <label>Summary</label>
          <p id="triageSummary"></p>
        </div>
      </div>
      <div class="triage-row">
        <div class="triage-field">
          <label>Verdict reason</label>
          <p id="verdictReason"></p>
        </div>
        <div class="triage-field">
          <label>Quality signal</label>
          <div id="qualityBadge"></div>
          <p id="qualityNotes" style="margin-top: 8px;"></p>
        </div>
      </div>
      <div class="triage-field">
        <label>Topics</label>
        <div class="topics-row" id="topicsRow"></div>
      </div>
    </div>

    <div class="extract-row">
      <p>Full transcript analysis → Notion log</p>
      <button class="btn-extract" id="extractBtn" onclick="runExtract()">Deep Extract →</button>
    </div>
  </div>

  <!-- EXTRACT RESULT -->
  <div class="extract-card" id="extractCard">

    <div class="extract-section" id="notionSection" style="display:none;">
      <div class="section-title">Logged to Notion</div>
      <a class="notion-link" id="notionLink" href="#" target="_blank">
        ↗ Open in Notion
      </a>
    </div>

    <div class="extract-section">
      <div class="section-title">Key Claims</div>
      <ul class="item-list" id="keyClaimsList"></ul>
    </div>

    <div class="extract-section">
      <div class="section-title">References</div>
      <div id="referencesList"></div>
    </div>

    <div class="extract-section">
      <div class="section-title">Coaching Ideas</div>
      <ul class="item-list" id="coachingList"></ul>
    </div>

    <div class="extract-section">
      <div class="section-title">Content Hooks</div>
      <ul class="item-list" id="contentHooksList"></ul>
    </div>

    <div class="extract-section">
      <div class="section-title">Research Questions</div>
      <ul class="item-list" id="researchList"></ul>
    </div>

    <div class="extract-section">
      <div class="section-title">🚩 Bro-Science Flags</div>
      <div id="broScienceList"></div>
    </div>

  </div>

</main>

<script>
  	 WORKER_URL = 'https://yttrawler-proxy.ian-mcarthur.workers.dev;

  let currentTriageData = null;
  let currentUrl = null;

  function setStatus(text, loading = false) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('spinner').classList.toggle('active', loading);
  }

  function showError(msg) {
    const el = document.getElementById('errorCard');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorCard').classList.remove('visible');
  }

  function setLoading(loading) {
    document.getElementById('triageBtn').disabled = loading;
    document.getElementById('extractBtn').disabled = loading;
  }

  async function runTriage() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    hideError();
    setLoading(true);
    setStatus('Fetching transcript...', true);
    document.getElementById('triageCard').classList.remove('visible');
    document.getElementById('extractCard').classList.remove('visible');

    try {
      setStatus('Analysing...', true);
      const res = await fetch(`${WORKER_URL}/triage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Triage failed');

      currentTriageData = data;
      currentUrl = url;
      renderTriage(data);
      setStatus('');
    } catch (err) {
      showError(err.message);
      setStatus('');
    } finally {
      setLoading(false);
    }
  }

  async function runExtract() {
    if (!currentUrl) return;

    hideError();
    setLoading(true);
    setStatus('Fetching full transcript...', true);
    document.getElementById('extractCard').classList.remove('visible');

    try {
      setStatus('Deep extracting — this takes ~20s...', true);
      const res = await fetch(`${WORKER_URL}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: currentUrl, triageData: currentTriageData })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Extraction failed');

      renderExtract(data);
      setStatus('');
    } catch (err) {
      showError(err.message);
      setStatus('');
    } finally {
      setLoading(false);
    }
  }

  function renderTriage(d) {
    document.getElementById('videoTitle').textContent = d.title;
    document.getElementById('videoChannel').textContent =
      `${d.channel} · ~${d.estimatedMinutes} min`;

    const badge = document.getElementById('verdictBadge');
    badge.textContent = d.verdict;
    badge.className = 'verdict-badge verdict-' + d.verdict.toLowerCase();

    document.getElementById('triageSummary').textContent = d.summary;
    document.getElementById('verdictReason').textContent = d.verdict_reason;

    const qualityMap = {
      'Evidence-based': 'quality-evidence',
      'Mixed': 'quality-mixed',
      'Anecdote-heavy': 'quality-anecdote',
      'Bro-science': 'quality-bro',
    };
    const qb = document.getElementById('qualityBadge');
    qb.innerHTML = `<span class="quality-badge ${qualityMap[d.quality_signal] || ''}">${d.quality_signal}</span>`;
    document.getElementById('qualityNotes').textContent = d.quality_notes;

    const topics = document.getElementById('topicsRow');
    topics.innerHTML = (d.topics || [])
      .map(t => `<span class="topic-chip">${t}</span>`).join('');

    document.getElementById('triageCard').classList.add('visible');
  }

  function renderList(listId, items, emptyMsg = 'None identified.') {
    const el = document.getElementById(listId);
    if (!items || items.length === 0) {
      el.innerHTML = `<span class="empty-state">${emptyMsg}</span>`;
      return;
    }
    el.innerHTML = items.map(item => `<li>${escHtml(item)}</li>`).join('');
  }

  function renderExtract(d) {
    // Notion link
    if (d.notionPageUrl) {
      document.getElementById('notionSection').style.display = 'block';
      document.getElementById('notionLink').href = d.notionPageUrl;
    }

    renderList('keyClaimsList', d.key_claims, 'No key claims extracted.');
    renderList('coachingList', d.coaching_ideas, 'No coaching ideas identified.');
    renderList('contentHooksList', d.content_hooks, 'No content hooks identified.');
    renderList('researchList', d.research_questions, 'No research questions raised.');

    // References
    const refEl = document.getElementById('referencesList');
    if (!d.references || d.references.length === 0) {
      refEl.innerHTML = '<span class="empty-state">No references mentioned.</span>';
    } else {
      refEl.innerHTML = d.references.map(r => `
        <div class="ref-item" style="margin-bottom:10px;">
          <span class="ref-type">${escHtml(r.type)}</span>
          <div class="ref-content">
            <div class="ref-name">${escHtml(r.name)}</div>
            <div class="ref-context">${escHtml(r.context)}</div>
          </div>
        </div>
      `).join('');
    }

    // Bro-science flags
    const bsEl = document.getElementById('broScienceList');
    if (!d.broscience_flags || d.broscience_flags.length === 0) {
      bsEl.innerHTML = '<span class="empty-state">None flagged.</span>';
    } else {
      bsEl.innerHTML = d.broscience_flags
        .map(f => `<div class="flag-item" style="margin-bottom:8px;">${escHtml(f)}</div>`)
        .join('');
    }

    document.getElementById('extractCard').classList.add('visible');
    document.getElementById('extractCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Allow Enter key to trigger triage
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runTriage();
  });
</script>

</body>
</html>
