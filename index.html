<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTtrawler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #e8ff00;
    --accent2: #ff4444;
    --text: #e8e8e8;
    --muted: #666;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 16px;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 0 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  header span {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 0 64px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  .btn {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 12px 16px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover:not(:disabled) {
    background: #fff;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .mode-row {
    display: flex;
    gap: 8px;
  }

  /* Status */
  .status {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 16px;
    min-height: 16px;
    letter-spacing: 0.05em;
  }

  .status.loading { color: var(--accent); }
  .status.error { color: var(--accent2); }

  /* Results */
  #results {
    margin-top: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover {
    background: var(--surface2);
  }

  .card-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .card-chevron {
    font-size: 0.6rem;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .card.open .card-chevron {
    transform: rotate(180deg);
  }

  .card-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .card.open .card-body {
    display: block;
  }

  /* Verdict banner */
  .verdict-banner {
    padding: 20px 16px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .verdict-watch { background: #0a1f0a; border: 1px solid #1a4d1a; }
  .verdict-skim  { background: #1a1500; border: 1px solid #4d3d00; }
  .verdict-skip  { background: #1f0a0a; border: 1px solid #4d1a1a; }

  .verdict-label {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .verdict-watch .verdict-label { color: #4ade80; }
  .verdict-skim  .verdict-label { color: #facc15; }
  .verdict-skip  .verdict-label { color: var(--accent2); }

  .verdict-meta {
    text-align: right;
  }

  .verdict-reason {
    font-size: 0.8rem;
    color: var(--muted);
    max-width: 300px;
    line-height: 1.4;
  }

  .verdict-time {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Video meta */
  .video-meta {
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 2px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-key {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .meta-val {
    font-size: 0.85rem;
    color: var(--text);
  }

  /* Tags */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-top: 12px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 3px 8px;
    letter-spacing: 0.05em;
  }

  .tag-on {
    background: #0a1a0a;
    color: #4ade80;
    border: 1px solid #1a4d1a;
  }

  .tag-off {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    text-decoration: line-through;
  }

  .tag-warn {
    background: #1f0a0a;
    color: var(--accent2);
    border: 1px solid #4d1a1a;
  }

  /* Text content */
  .card-body p {
    font-size: 0.875rem;
    line-height: 1.6;
    color: #ccc;
    padding-top: 14px;
  }

  .card-body ul {
    padding-top: 14px;
    padding-left: 0;
    list-style: none;
  }

  .card-body ul li {
    font-size: 0.85rem;
    line-height: 1.5;
    color: #ccc;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .card-body ul li:last-child {
    border-bottom: none;
  }

  .li-bullet {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.7rem;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .li-warn {
    color: var(--accent2);
  }

  /* Refs */
  .ref-group {
    padding-top: 14px;
  }

  .ref-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .ref-item {
    font-size: 0.85rem;
    color: #ccc;
    padding: 4px 0;
  }

  /* Extract button */
  .extract-prompt {
    margin-top: 16px;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .extract-prompt p {
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* Notion badge */
  .notion-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.05em;
  }

  .notion-badge.saved {
    color: #4ade80;
  }

  /* Divider */
  .section-divider {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin: 24px 0 12px;
  }
</style>
</head>
<body>

<div style="max-width:680px;margin:0 auto;">
  <header>
    <h1>YTtrawler</h1>
    <span>signal extraction from noise</span>
  </header>
</div>

<div class="container">

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="paste youtube url" autocomplete="off" autocorrect="off" spellcheck="false" />
  </div>

  <div class="mode-row">
    <button class="btn btn-primary" id="triageBtn" onclick="runTriage()">→ Triage</button>
    <button class="btn btn-secondary" id="extractBtn" onclick="runExtract()" disabled>↓ Deep Extract</button>
  </div>

  <div class="status" id="status"></div>

  <div id="results"></div>

</div>

<script>
  const WORKER_URL = 'https://yttrawler-proxy.YOUR_SUBDOMAIN.workers.dev';

  let currentUrl = '';
  let triageDone = false;

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function setLoading(loading) {
    document.getElementById('triageBtn').disabled = loading;
    document.getElementById('extractBtn').disabled = loading || !triageDone;
  }

  async function runTriage() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { setStatus('paste a url first', 'error'); return; }

    currentUrl = url;
    triageDone = false;
    document.getElementById('results').innerHTML = '';
    setLoading(true);
    setStatus('fetching transcript...', 'loading');

    try {
      const res = await fetch(`${WORKER_URL}/triage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      setStatus('');
      renderTriage(data);
      triageDone = true;
      document.getElementById('extractBtn').disabled = false;

    } catch (err) {
      setStatus('error: ' + err.message, 'error');
    } finally {
      document.getElementById('triageBtn').disabled = false;
    }
  }

  async function runExtract() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    setLoading(true);
    setStatus('running deep extract — this takes ~20s...', 'loading');

    try {
      const res = await fetch(`${WORKER_URL}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      setStatus('');
      renderExtract(data);

    } catch (err) {
      setStatus('error: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function renderTriage(data) {
    const verdict = (data.verdict || 'SKIP').toUpperCase();
    const verdictClass = verdict === 'WATCH' ? 'verdict-watch' : verdict === 'SKIM' ? 'verdict-skim' : 'verdict-skip';
    const duration = data.meta?.duration ? Math.round(data.meta.duration / 60) + ' min' : '—';
    const useful = data.estimated_useful_minutes ? data.estimated_useful_minutes + ' min useful' : '';

    const qs = data.quality_signals || {};
    const rel = data.relevance || {};

    const tags = [
      { label: 'evidence-based', on: qs.evidence_based },
      { label: 'anecdote-heavy', on: qs.anecdote_heavy, warn: true },
      { label: '⚠ bro-science', on: qs.bro_science_flagged, warn: true },
      { label: 'rucking', on: rel.rucking },
      { label: 'older males', on: rel.older_males_fitness },
      { label: 'coaching', on: rel.coaching_methods },
      { label: 'references', on: rel.research_references },
    ];

    const tagsHTML = tags.map(t => {
      if (t.warn && t.on) return `<span class="tag tag-warn">${t.label}</span>`;
      return `<span class="tag ${t.on ? 'tag-on' : 'tag-off'}">${t.label}</span>`;
    }).join('');

    document.getElementById('results').innerHTML = `
      <div class="video-meta">
        <div class="meta-item">
          <span class="meta-key">Title</span>
          <span class="meta-val">${esc(data.meta?.title || '—')}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Channel</span>
          <span class="meta-val">${esc(data.meta?.channel || '—')}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Duration</span>
          <span class="meta-val">${duration}</span>
        </div>
      </div>

      <div class="verdict-banner ${verdictClass}">
        <div>
          <div class="verdict-label">${verdict}</div>
          ${useful ? `<div class="verdict-time">${useful}</div>` : ''}
        </div>
        <div class="verdict-meta">
          <div class="verdict-reason">${esc(data.verdict_reason || '')}</div>
        </div>
      </div>

      ${makeCard('Summary', `<p>${esc(data.summary || '')}</p>`, true)}

      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-label">Signals & Relevance</span>
          <span class="card-chevron">▼</span>
        </div>
        <div class="card-body">
          <div class="tags">${tagsHTML}</div>
          ${qs.bro_science_flagged && qs.bro_science_detail ? `<p style="color:var(--accent2);margin-top:12px;font-size:0.8rem;">${esc(qs.bro_science_detail)}</p>` : ''}
        </div>
      </div>

      <div class="extract-prompt">
        <p>Worth going deeper? Run a full extract to pull claims, references, and coaching ideas → logs to Notion.</p>
        <button class="btn btn-primary" onclick="runExtract()">↓ Extract</button>
      </div>
    `;
  }

  function renderExtract(data) {
    const existingExtract = document.getElementById('extract-section');
    if (existingExtract) existingExtract.remove();

    const refs = data.references || {};
    const hasRefs = (refs.books?.length || refs.studies?.length || refs.people?.length || refs.channels?.length);

    const refsHTML = hasRefs ? `
      ${refs.books?.length ? `<div class="ref-group"><div class="ref-label">Books</div>${refs.books.map(r => `<div class="ref-item">${esc(r)}</div>`).join('')}</div>` : ''}
      ${refs.studies?.length ? `<div class="ref-group"><div class="ref-label">Studies</div>${refs.studies.map(r => `<div class="ref-item">${esc(r)}</div>`).join('')}</div>` : ''}
      ${refs.people?.length ? `<div class="ref-group"><div class="ref-label">People</div>${refs.people.map(r => `<div class="ref-item">${esc(r)}</div>`).join('')}</div>` : ''}
      ${refs.channels?.length ? `<div class="ref-group"><div class="ref-label">Channels</div>${refs.channels.map(r => `<div class="ref-item">${esc(r)}</div>`).join('')}</div>` : ''}
    ` : '<p>No references found.</p>';

    const bsFlags = data.bro_science_flags || [];

    const section = document.createElement('div');
    section.id = 'extract-section';
    section.innerHTML = `
      <div class="section-divider">— deep extract —</div>

      ${makeCard('Summary', `<p>${esc(data.summary || '')}</p>`, true)}
      ${makeCard('Key Claims', listHTML(data.key_claims, false), false)}
      ${makeCard('References', refsHTML, false)}
      ${makeCard('Coaching Ideas', listHTML(data.coaching_ideas, false), false)}
      ${makeCard('Content Ideas', listHTML(data.content_ideas, false), false)}
      ${makeCard('Research Questions', listHTML(data.research_questions, false), false)}
      ${bsFlags.length ? makeCard('⚠ Bro-Science Flags', listHTML(bsFlags, true), true) : ''}

      <div class="notion-badge saved">✓ logged to notion · YT Research Library</div>
    `;

    document.getElementById('results').appendChild(section);
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function makeCard(label, bodyHTML, open = false) {
    return `
      <div class="card ${open ? 'open' : ''}">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-label">${label}</span>
          <span class="card-chevron">▼</span>
        </div>
        <div class="card-body">${bodyHTML}</div>
      </div>
    `;
  }

  function listHTML(arr, warn = false) {
    if (!arr || !arr.length) return '<p>None found.</p>';
    return `<ul>${arr.map(item => `
      <li>
        <span class="li-bullet ${warn ? 'li-warn' : ''}">›</span>
        <span>${esc(item)}</span>
      </li>
    `).join('')}</ul>`;
  }

  function toggleCard(header) {
    header.closest('.card').classList.toggle('open');
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Allow Enter key
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runTriage();
  });
</script>
</body>
</html>
